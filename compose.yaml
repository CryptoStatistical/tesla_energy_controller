services:
  controller:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      WEB_HOST: 0.0.0.0
    volumes:
      - ./.secrets:/app/.secrets:ro
      - ./data:/app/data
    ports:
      - 127.0.0.1:8080:8080
    security_opt:
      - no-new-privileges:true
